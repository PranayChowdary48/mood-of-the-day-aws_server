AWSTemplateFormatVersion: "2010-09-09"
Description: Optional Secrets Manager rotation Lambda and schedule for refresh auth secret.

Parameters:
  EnvName:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev
  AutomaticallyAfterDays:
    Type: Number
    Default: 7
    MinValue: 1

Resources:
  RotationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretRotationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecretVersionStage
                Resource:
                  Fn::ImportValue:
                    Fn::Sub: Mood-${EnvName}-RefreshAuthSecretArn
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"

  RotationLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Timeout: 60
      Role: !GetAtt RotationLambdaRole.Arn
      FunctionName: !Sub mood-${EnvName}-refresh-secret-rotation
      Code:
        ZipFile: |
          import json
          import os
          import random
          import string
          import boto3

          sm = boto3.client("secretsmanager")

          def _random_value(length=20):
            alphabet = string.ascii_letters + string.digits
            return "".join(random.choice(alphabet) for _ in range(length))

          def _current_secret(secret_id):
            current = sm.get_secret_value(SecretId=secret_id, VersionStage="AWSCURRENT")
            return json.loads(current["SecretString"])

          def _pending_exists(secret_id, token):
            try:
              sm.get_secret_value(SecretId=secret_id, VersionId=token, VersionStage="AWSPENDING")
              return True
            except sm.exceptions.ResourceNotFoundException:
              return False

          def create_secret(secret_id, token):
            if _pending_exists(secret_id, token):
              return
            current = _current_secret(secret_id)
            pending = {
              "refresh_user": f"mood-{_random_value(8)}",
              "refresh_password": _random_value(24),
            }
            if "refresh_user" not in current:
              pending["refresh_user"] = f"mood-{_random_value(8)}"
            sm.put_secret_value(
              SecretId=secret_id,
              ClientRequestToken=token,
              SecretString=json.dumps(pending),
              VersionStages=["AWSPENDING"],
            )

          def set_secret(secret_id, token):
            # No external system to update. Secret itself is the source of truth.
            return

          def test_secret(secret_id, token):
            pending = sm.get_secret_value(
              SecretId=secret_id,
              VersionId=token,
              VersionStage="AWSPENDING",
            )
            json.loads(pending["SecretString"])

          def finish_secret(secret_id, token):
            meta = sm.describe_secret(SecretId=secret_id)
            current_version = None
            for version, stages in meta.get("VersionIdsToStages", {}).items():
              if "AWSCURRENT" in stages:
                current_version = version
                break
            if current_version == token:
              return
            sm.update_secret_version_stage(
              SecretId=secret_id,
              VersionStage="AWSCURRENT",
              MoveToVersionId=token,
              RemoveFromVersionId=current_version,
            )

          def lambda_handler(event, context):
            secret_id = event["SecretId"]
            token = event["ClientRequestToken"]
            step = event["Step"]

            meta = sm.describe_secret(SecretId=secret_id)
            versions = meta.get("VersionIdsToStages", {})
            if token not in versions:
              raise ValueError("Invalid rotation token")
            if "AWSCURRENT" in versions[token]:
              return
            if "AWSPENDING" not in versions[token]:
              raise ValueError("Token is not set as AWSPENDING")

            if step == "createSecret":
              create_secret(secret_id, token)
            elif step == "setSecret":
              set_secret(secret_id, token)
            elif step == "testSecret":
              test_secret(secret_id, token)
            elif step == "finishSecret":
              finish_secret(secret_id, token)
            else:
              raise ValueError("Invalid step")

  AllowSecretsManagerInvoke:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RotationLambda
      Action: lambda:InvokeFunction
      Principal: secretsmanager.amazonaws.com
      SourceArn:
        Fn::ImportValue:
          Fn::Sub: Mood-${EnvName}-RefreshAuthSecretArn

  RotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    DependsOn:
      - AllowSecretsManagerInvoke
    Properties:
      SecretId:
        Fn::ImportValue:
          Fn::Sub: Mood-${EnvName}-RefreshAuthSecretArn
      RotationLambdaARN: !GetAtt RotationLambda.Arn
      RotationRules:
        AutomaticallyAfterDays: !Ref AutomaticallyAfterDays

Outputs:
  RotationLambdaArn:
    Value: !GetAtt RotationLambda.Arn
    Export:
      Name: !Sub Mood-${EnvName}-SecretRotationLambdaArn
